<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — ページが見つかりません | CheerRing</title>
  <meta name="description" content="お探しのページは見つかりませんでした。">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://manabu619.github.io/cheerring/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #06060e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Subtle background noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .wrap { position: relative; z-index: 1; max-width: 480px; }

    .code {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(120px, 25vw, 180px);
      line-height: 1;
      color: transparent;
      background: linear-gradient(135deg, #c41e3a 0%, #d4a843 100%);
      -webkit-background-clip: text;
      background-clip: text;
      letter-spacing: 0.04em;
      margin-bottom: .25rem;
    }

    .title {
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      font-weight: 700;
      color: rgba(255,255,255,.9);
      margin-bottom: 1rem;
      letter-spacing: .04em;
    }

    .body-text {
      font-size: .9rem;
      color: rgba(255,255,255,.5);
      line-height: 1.8;
      margin-bottom: 2.5rem;
    }

    .btn {
      display: inline-block;
      padding: .8rem 2.2rem;
      background: linear-gradient(135deg, #c41e3a 0%, #a01830 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-size: .9rem;
      font-weight: 700;
      letter-spacing: .08em;
      transition: opacity .2s, transform .2s;
    }
    .btn:hover { opacity: .85; transform: translateY(-2px); }

    .ring-deco {
      width: 160px;
      height: 160px;
      border: 1px solid rgba(212,168,67,.15);
      border-radius: 50%;
      position: fixed;
      top: -40px;
      right: -40px;
      pointer-events: none;
    }
    .ring-deco::after {
      content: '';
      position: absolute;
      inset: 20px;
      border: 1px solid rgba(196,30,58,.12);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="ring-deco"></div>
  <div class="wrap">
    <div class="code">404</div>
    <p class="title">ページが見つかりません</p>
    <p class="body-text">
      お探しのページは移動または削除されたか、<br>
      URLが正しくない可能性があります。
    </p>
    <a href="/cheerring/" class="btn">トップページへ戻る →</a>
  </div>
</body>
</html>
